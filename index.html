<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCycle - ระบบค้นหาศูนย์รีไซเคิลและจำแนกขยะ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d6a4f;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }
        .section {
            background: #e9f5ed;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #52b788;
        }
        h3 {
            margin-top: 0;
            color: #1b4332;
        }
        button {
            width: 100%;
            background-color: #52b788;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #40916c;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #d8f3dc;
            display: none;
        }
        #map-container {
            width: 100%;
            height: 300px;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid #52b788;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 GreenCycle Web App</h1>
    <p class="subtitle">โครงงานนวัตกรรม STEM เพื่อสิ่งแวดล้อมที่ยั่งยืน</p>

    <div class="section">
        <h3>📍 ระบบค้นหาและแสดงศูนย์รีไซเคิลบน Google Maps</h3>
        <p>คลิกเพื่อแชร์พิกัดของคุณ และค้นหาศูนย์รีไซเคิลที่ใกล้ที่สุดบนแผนที่จริง</p>
        <button onclick="findLocationWithMap()">ค้นหาศูนย์รีไซเคิลใกล้ตัวคุณ</button>
        
        <div id="geo-result" class="result-box">
            <p><strong>พิกัดของคุณ:</strong> <span id="user-geo">-</span></p>
            <p><strong>ศูนย์รีไซเคิลที่ใกล้ที่สุด:</strong> <span id="center-name" style="color:#2d6a4f; font-weight:bold;">-</span></p>
        </div>

        <div id="map-container">
            <iframe 
                id="google-map-iframe"
                width="100%" 
                height="100%" 
                style="border:0; border-radius: 6px;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>
</div>

<script>
    function findLocationWithMap() {
        var centers = [
            { name: "ศูนย์รีไซเคิลขยะพลาสติกเขียวสยาม", lat: 13.7563, lon: 100.5018 },
            { name: "โรงรับซื้อกระดาษและโลหะเก่าบางซื่อ", lat: 13.8156, lon: 100.5612 },
            { name: "จุดรับทิ้งขยะอิเล็กทรอนิกส์ประจำจังหวัด", lat: 13.7226, lon: 100.5284 }
        ];

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var userLat = position.coords.latitude;
                var userLon = position.coords.longitude;
                
                document.getElementById("user-geo").innerText = "Lat " + userLat.toFixed(4) + ", Lon " + userLon.toFixed(4);
                
                var minDistance = Infinity;
                var nearestCenter = null;
                
                centers.forEach(function(center) {
                    var distance = Math.sqrt(Math.pow(center.lat - userLat, 2) + Math.pow(center.lon - userLon, 2));
                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestCenter = center;
                    }
                });
                
                document.getElementById("center-name").innerText = nearestCenter.name;
                document.getElementById("geo-result").style.display = "block";
                
                // ใช้การต่อสตริงด้วยเครื่องหมายบวกธรรมดา เพื่อป้องกันความคลาดเคลื่อนของเครื่องหมายคำพูด
                var mapIframe = document.getElementById("google-map-iframe");
                mapIframe.src = "https://google.com" + nearestCenter.lat + "," + nearestCenter.lon + "&z=15&output=embed";
                
                document.getElementById("map-container").style.display = "block";
                
            }, function(error) {
                alert("ไม่สามารถเข้าถึงพิกัดของคุณได้ โปรดเปิดสิทธิ์ระบุตำแหน่งที่ตั้งบนอุปกรณ์");
            });
        } else {
            alert("เบราว์เซอร์ของคุณไม่รองรับการระบุพิกัดตำแหน่ง");
        }
    }
</script>

</body>
</html>
